# Gateway VM - sysctl persistente
# Deploy: cp sysctl-99-gateway.conf /etc/sysctl.d/99-gateway.conf && sysctl -p /etc/sysctl.d/99-gateway.conf

# Abilita IP forwarding (necessario per NAT/routing tra interfacce)
net.ipv4.ip_forward=1

# ECMP L4 hashing: distribuisce connessioni TCP su src+dst IP+porta
# Garantisce che ogni TCP flow usi sempre la stessa interfaccia (no riordino pacchetti)
net.ipv4.fib_multipath_hash_policy=1
